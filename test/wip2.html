
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catholic Library</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #ffe888;
  margin: 0;
  padding: 20px;
  color: #1c1c1e;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #ffffff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
}

.search-wrapper {
  position: relative;
  margin-bottom: 16px;
}

.search-wrapper input {
  width: 100%;
  padding: 12px 42px 12px 14px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.search-wrapper button {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: none;
  font-size: 20px;
  cursor: pointer;
  display: none;
}

.library {
  display: flex;
  flex-direction: column;
}

.book {
  display: block;
  background: #f2f2f7;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  text-decoration: none;
  color: #000;
}

.book:hover {
  background: #e6e6eb;
}

.title {
  font-size: 15px;
  font-weight: 600;
}

mark {
  background: #ffeb3b;
}
</style>
</head>


<body>
<div class="container">
  <h1>Catholic Library</h1>

  <!-- ✅ BOOK COUNTER (DIRECTLY UNDER TITLE) -->
  <div id="bookCount" style="margin: 4px 0 16px 0; font-weight: 600;">
    Books: 0
  </div>

  <div class="search-wrapper">
    <input id="searchInput" placeholder="Search books...">
    <button id="clearBtn" onclick="clearSearch()">×</button>
  </div>


  <div class="library">
