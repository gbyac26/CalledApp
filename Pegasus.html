<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PEGASUS Terminal</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #00ff66;
        font-family: monospace;
        overflow: hidden;
        height: 100vh;
    }
    
    .grid {
        position: fixed;
        width: 100%;
        height: 100%;
        background-image:
            linear-gradient(rgba(0,255,102,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,255,102,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
    }

    .container {
        width: 700px;
        margin: 60px auto;
        border: 1px solid #00ff66;
        padding: 20px;
        box-shadow: 0 0 30px #00ff66;
        background: rgba(0,0,0,0.85);
        box-sizing: border-box;
    }

    h1 {
        text-align: center;
        letter-spacing: 3px;
        font-size: 20px;
        margin: 0;
        white-space: nowrap;
    }

    .warning {
        text-align: center;
        color: red;
        animation: blink 0.6s infinite;
        margin: 10px 0;
        font-size: 12px;
        white-space: nowrap;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    .status {
        margin-top: 10px;
        font-size: 13px;
        color: #00ffaa;
        min-height: 18px;
        white-space: nowrap;
    }

    .bar {
        height: 18px;
        border: 1px solid #00ff66;
        margin-top: 15px;
        overflow: hidden;
    }

    .fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00ff66, #00ffaa);
        transition: width 0.2s;
    }

    .log {
        margin-top: 15px;
        height: 260px;
        overflow-y: auto;
        font-size: 12px;
        line-height: 1.4;

        /* HIDE SCROLLBARS */
        scrollbar-width: none;
    }

    .log::-webkit-scrollbar {
        display: none;
    }

    .tag {
        color: #ff0044;
    }

    .overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
    }

    .overlay.active {
        opacity: 1;
        pointer-events: all;
    }

    .takeover {
        color: red;
        font-size: 28px;
        text-align: center;
        animation: flicker 0.2s infinite;
    }

    .access {
        margin-top: 20px;
        font-size: 24px;
        color: #ff0000;
        animation: flash 0.3s infinite;
    }

    @keyframes flash {
        0% { opacity: 1; }
        50% { opacity: 0.1; }
        100% { opacity: 1; }
    }

    @keyframes flicker {
        0% { opacity: 1; }
        25% { opacity: 0.3; }
        50% { opacity: 1; }
        75% { opacity: 0.6; }
        100% { opacity: 1; }
    }

    @media (max-width: 600px) {
        .container {
            width: 95vw;
            height: 90vh;
            margin: 10px auto;
            padding: 15px;
            border: 1px solid #00ff66;
            box-shadow: 0 0 20px #00ff66;
            display: flex;
            flex-direction: column;
        }

        .log {
            flex: 1;
            height: auto;
            overflow-y: auto;

            /* HIDE SCROLLBARS ON MOBILE */
            scrollbar-width: none;
        }

        .log::-webkit-scrollbar {
            display: none;
        }
    }
</style>
</head>

<body>

<div class="grid"></div>

<div class="container">
    <h1>PEGASUS TERMINAL</h1>

    <div class="warning">⚠ REMOTE SYSTEM ACCESS ⚠</div>

    <div class="status" id="status">BOOTING VIRTUAL CORE...</div>

    <div class="bar"><div class="fill" id="fill"></div></div>

    <div class="log" id="log"></div>
</div>

<div class="overlay" id="overlay">
    <div class="takeover">SYSTEM TAKEOVER DETECTED</div>
    <div class="access" id="access">ACCESS GRANTED</div>
</div>

<script>
let progress = 0;
let fill = document.getElementById("fill");
let log = document.getElementById("log");
let status = document.getElementById("status");
let overlay = document.getElementById("overlay");
let access = document.getElementById("access");

/* Ordered, evenly timed main messages */
let messages = [
    "Initializing runtime...",
    "Loading kernel modules...",
    "Downloading telemetry package...",
    "Syncing network nodes...",
    "Allocating memory blocks...",
    "Injecting analytics pipeline...",
    "Establishing encrypted tunnel...",
    "Remote session handshake...",
    "Streaming data packets...",
    "Compiling ephemeral runtime layer...",
    "Finalizing environment..."
];

let msgIndex = 0;
let statusTimer = 0;
let statusInterval = 30;

/* Random tags */
const tags = ["SYS", "NET", "CPU", "SEC", "IO", "DBG", "TRACE", "EVENT", "DAEMON"];
function randomTag() {
    return tags[Math.floor(Math.random() * tags.length)];
}

/* Noise message generator */
function getNoiseMessage() {
    const base = [
        "uplink jitter detected",
        "handshake retry queued",
        "routing table refresh",
        "packet loss threshold exceeded",
        "cache line invalidated",
        "thread scheduler drift detected",
        "heap allocation spike",
        "stack frame rewrite triggered",
        "auth token renegotiated",
        "cipher suite rotated",
        "entropy pool refill",
        "firewall rule sync",
        "I/O bus saturation event",
        "thermal variance detected",
        "clock cycle deviation",
        "memory controller resync",
        "descriptor table update",
        "watchdog timer ping",
        "interrupt vector dispatch",
        "process forked (PID " + Math.floor(Math.random()*9000+1000) + ")"
    ];
    return base[Math.floor(Math.random() * base.length)];
}

function add(msg) {
    let div = document.createElement("div");
    div.innerHTML = "<span class='tag'>[" + randomTag() + "]</span> " + msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

let timer = setInterval(() => {

    if (progress >= 100) {
        progress = 100;
        fill.style.width = "100%";
        clearInterval(timer);

        status.textContent = "COMPLETE";
        add("All processes terminated.");

        setTimeout(() => {
            overlay.classList.add("active");
            setTimeout(() => {
                access.textContent = "ACCESS GRANTED";
            }, 1200);
        }, 800);

        return;
    }

    progress += Math.random() * 1.2;
    if (progress > 100) progress = 100;
    fill.style.width = progress + "%";

    statusTimer++;
    if (statusTimer >= statusInterval && msgIndex < messages.length) {
        status.textContent = messages[msgIndex];
        add(messages[msgIndex]);
        msgIndex++;
        statusTimer = 0;
    }

    let lines = Math.floor(Math.random() * 4) + 2;
    for (let i = 0; i < lines; i++) {

        add(getNoiseMessage());

        if (Math.random() > 0.70) {
            let variance = Math.min(Math.floor(Math.random() * 90), 100);
            add("node sync variance +" + variance + "%");
        }

        if (Math.random() > 0.80) {
            let latency = (Math.random() * 10).toFixed(2);
            add("latency spike detected (" + latency + "ms)");
        }
    }

}, 90);
</script>

</body>
</html>
