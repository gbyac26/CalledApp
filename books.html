<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>PDF Library</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffe888;
      margin: 0;
      padding: 24px;
      color: #1c1c1e;
    }

    .card {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    a.pdf-link {
      display: block;
      text-decoration: none;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      background: #f2f2f7;
      color: #000;
      font-weight: 500;
    }

    a.pdf-link:hover {
      background: #e6e6eb;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>📄 Document Library</h1>

    <a class="pdf-link" href="pdf/LivesOfTheSaintsSelected.pdf" target="_blank">
      Lives of the Saints
    </a>

    <a class="pdf-link" href="The-Story-of-a-Soul.pdf" target="_blank">
      Story of a Soul
    </a>

    <a class="pdf-link" href="pdf/TheLadderofDivineAscent.pdf" target="_blank">
      The Ladder of Divine Ascent
    </a>

    <a class="pdf-link" href="pdf/ascentcarmel.pdf" target="_blank">
      Ascent of Mt. Carmel.pdf
    </a>

  </div>

</body>
</html>
