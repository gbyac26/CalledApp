<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>PDF Library</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffe888;
      margin: 0;
      padding: 20px;
      color: #1c1c1e;
    }

    .card {
      max-width: 1100px;
      margin: auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 14px;
    }

    /* ✅ GRID FOR HUNDREDS OF BOOKS */
    .library {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    /* ✅ SMALL BOOK TILES */
    a.pdf-link {
      display: block;
      padding: 10px 12px;
      background: #f2f2f7;
      border-radius: 10px;
      text-decoration: none;
      color: #000;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    a.pdf-link:hover {
      background: #e6e6eb;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Catholic Library</h1>

    <div class="library">
